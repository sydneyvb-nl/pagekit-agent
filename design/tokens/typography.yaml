# Typography tokens.
families:
  system: "system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
  serif: "Georgia, 'Times New Roman', serif"
scale: # rem, modular
  body: 1
  lead: 1.125
  h3: 1.5
  h2: 2
  h1: 2.75
weights:
  regular: 400
  medium: 500
  bold: 700
line_height:
  tight: 1.2
  normal: 1.6
