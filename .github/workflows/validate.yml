name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r lint

      - name: Test
        run: pnpm test

      - name: Validate example brief
        run: pnpm validate:brief

      - name: Plan example site (structural quality gates)
        run: pnpm plan --dry-run
